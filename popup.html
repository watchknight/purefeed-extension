<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureFeed</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <img src="icon48.png" alt="PureFeed" class="logo">
        <div>
          <h1>PureFeed</h1>
          <p class="subtitle">Ad & Shorts Blocker</p>
        </div>
      </div>
    </div>

    <!-- YouTube Section -->
    <div class="section">
      <div class="section-title">
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
          <rect width="20" height="14" rx="3" fill="#FF0000"/>
          <path d="M8 4L13 7L8 10V4Z" fill="white"/>
        </svg>
        <span>YouTube</span>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">Block Shorts</span>
          <span class="toggle-desc">Hide all Shorts content</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="yt-shorts" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">Block Ads</span>
          <span class="toggle-desc">Skip video & banner ads</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="yt-ads" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Facebook Section -->
    <div class="section">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="10" fill="#1877F2"/>
          <path d="M13.5 10.5H11.5V16H9V10.5H7V8.5H9V7C9 5.34 10.34 4 12 4H13.5V6H12.5C11.95 6 11.5 6.45 11.5 7V8.5H13.5L13.5 10.5Z" fill="white"/>
        </svg>
        <span>Facebook</span>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">Block Reels</span>
          <span class="toggle-desc">Hide all Reels content</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="fb-reels" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">Block Ads</span>
          <span class="toggle-desc">Hide sponsored posts & sidebar</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="fb-ads" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>v2.1</span>
      <span>by Nano Banana Pro</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
